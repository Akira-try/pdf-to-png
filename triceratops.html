<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トリケラトプス アドベンチャー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    #hud { display: flex; gap: 24px; margin-bottom: 8px; font-size: 1rem; color: #fff; }
    #hud b { color: #f9c74f; }
    canvas { display: block; border-radius: 6px; box-shadow: 0 0 40px rgba(0,0,0,0.7); }
    #info { color: #777; font-size: 0.75rem; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="hud">
    <span>スコア: <b id="score">0</b></span>
    <span>ライフ: <b id="lives">❤️❤️❤️</b></span>
    <span>ステージ: <b id="level">1</b></span>
  </div>
  <canvas id="canvas" width="800" height="450"></canvas>
  <div id="info">← → 移動 ｜ ↑ / Z ジャンプ ｜ X 攻撃（ツノ突き）</div>
<script>
// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.arcTo(x + w, y, x + w, y + r, r);
    this.lineTo(x + w, y + h - r);
    this.arcTo(x + w, y + h, x + w - r, y + h, r);
    this.lineTo(x + r, y + h);
    this.arcTo(x, y + h, x, y + h - r, r);
    this.lineTo(x, y + r);
    this.arcTo(x, y, x + r, y, r);
    this.closePath();
  };
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 450, GROUND_Y = 390, LEVEL_W = 9000;
const GRAVITY = 0.55, JUMP_V = -13;

let state = 'title', score = 0, lives = 3, level = 1, cameraX = 0;

const P = { x: 80, y: GROUND_Y - 44, w: 56, h: 44, vx: 0, vy: 0, onGround: false, facing: 1, attackTimer: 0, invincible: 0, animFrame: 0 };
let platforms = [], enemies = [], coins = [], particles = [], goalX = 8700;

const keys = {};
window.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (['ArrowUp','KeyZ','Space'].includes(e.code)) {
    if (state === 'playing' && P.onGround) { P.vy = JUMP_V; P.onGround = false; }
    if (['title','gameover','clear'].includes(state)) startGame();
  }
  if (e.code === 'KeyX' && state === 'playing' && P.attackTimer <= 0) P.attackTimer = 22;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function resetPlayer() {
  P.x = 80; P.y = GROUND_Y - P.h;
  P.vx = 0; P.vy = 0; P.onGround = false;
  P.facing = 1; P.attackTimer = 0; P.invincible = 0; P.animFrame = 0;
}

function generateLevel() {
  platforms = []; enemies = []; coins = [];
  const diff = Math.min(level, 6);
  let wx = 350;
  while (wx < LEVEL_W - 400) {
    const pw = 90 + Math.random() * 110;
    const py = GROUND_Y - 95 - Math.random() * 140;
    platforms.push({ x: wx, y: py, w: pw, h: 18 });
    for (let i = 0; i < Math.floor(pw / 38); i++)
      coins.push({ x: wx + 18 + i * 36, y: py - 28, collected: false, bob: Math.random() * Math.PI * 2 });
    if (Math.random() > 0.45) {
      const gx = wx - 80 - Math.random() * 60;
      for (let i = 0; i < 1 + Math.floor(Math.random() * 3); i++)
        coins.push({ x: gx + i * 36, y: GROUND_Y - 30, collected: false, bob: Math.random() * Math.PI * 2 });
    }
    wx += pw + 90 + Math.random() * 170;
    if (pw > 95 && Math.random() < 0.35 + diff * 0.05) {
      const sp = 0.7 + diff * 0.12;
      enemies.push({ x: wx - pw / 2 - 20, y: py - 38, w: 42, h: 38, vx: sp, alive: true, animFrame: 0, facing: 1, patrol: { x: wx - pw, w: pw }, deathTimer: 0 });
    }
    if (Math.random() < 0.45 + diff * 0.07) {
      const sp = 0.9 + diff * 0.14;
      enemies.push({ x: wx - 120 + Math.random() * 80, y: GROUND_Y - 38, w: 42, h: 38, vx: -sp, alive: true, animFrame: 0, facing: -1, patrol: null, deathTimer: 0 });
    }
  }
  goalX = LEVEL_W - 200;
}

function startGame() {
  if (state === 'gameover') { lives = 3; score = 0; level = 1; }
  if (state === 'clear') level++;
  generateLevel(); resetPlayer(); cameraX = 0; state = 'playing'; updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
  document.getElementById('level').textContent = level;
}

function spawnParticles(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, spd = 1.5 + Math.random() * 3.5;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1.5, life: 1, decay: 0.025 + Math.random() * 0.025, r: 3 + Math.random() * 4, color });
  }
}

function update() {
  if (keys['ArrowLeft']) { P.vx = -5; P.facing = -1; }
  else if (keys['ArrowRight']) { P.vx = 5; P.facing = 1; }
  else P.vx *= 0.65;
  if (P.attackTimer > 16) P.vx = P.facing * 9;
  if (P.attackTimer > 0) P.attackTimer--;
  if (P.invincible > 0) P.invincible--;
  P.vy = Math.min(P.vy + GRAVITY, 18);
  const prevY = P.y;
  P.x = Math.max(0, Math.min(P.x + P.vx, LEVEL_W - P.w));
  P.y += P.vy;
  if (Math.abs(P.vx) > 0.5 || !P.onGround) P.animFrame++;
  P.onGround = false;
  if (P.y + P.h >= GROUND_Y) { P.y = GROUND_Y - P.h; P.vy = 0; P.onGround = true; }
  for (const pl of platforms) {
    const inX = P.x + P.w - 4 > pl.x && P.x + 4 < pl.x + pl.w;
    if (P.vy >= 0 && inX && prevY + P.h <= pl.y + 2 && P.y + P.h >= pl.y) {
      P.y = pl.y - P.h; P.vy = 0; P.onGround = true;
    }
  }
  if (P.y > H + 50) { onPlayerDie(); return; }

  let atkBox = null;
  if (P.attackTimer > 12)
    atkBox = { x: P.facing === 1 ? P.x + P.w : P.x - 52, y: P.y + 4, w: 52, h: P.h - 8 };

  for (const e of enemies) {
    if (!e.alive) { if (e.deathTimer > 0) e.deathTimer--; continue; }
    e.animFrame++;
    e.x += e.vx;
    if (e.patrol) {
      if (e.x < e.patrol.x) { e.x = e.patrol.x; e.vx = Math.abs(e.vx); e.facing = 1; }
      if (e.x + e.w > e.patrol.x + e.patrol.w) { e.x = e.patrol.x + e.patrol.w - e.w; e.vx = -Math.abs(e.vx); e.facing = -1; }
    } else {
      if (e.x < 0) { e.x = 0; e.vx = Math.abs(e.vx); e.facing = 1; }
      if (e.x + e.w > LEVEL_W) { e.x = LEVEL_W - e.w; e.vx = -Math.abs(e.vx); e.facing = -1; }
    }
    // Player vs enemy
    if (P.x < e.x + e.w && P.x + P.w > e.x && P.y < e.y + e.h && P.y + P.h > e.y) {
      if (P.vy >= 0 && prevY + P.h <= e.y + 8) { killEnemy(e); P.vy = JUMP_V * 0.65; }
      else if (P.invincible <= 0) onPlayerHit();
    }
    if (atkBox && e.x < atkBox.x + atkBox.w && e.x + e.w > atkBox.x && e.y < atkBox.y + atkBox.h && e.y + e.h > atkBox.y)
      killEnemy(e);
  }

  for (const c of coins) {
    if (c.collected) continue;
    c.bob += 0.05;
    if (Math.abs(P.x + P.w / 2 - c.x) < 26 && Math.abs(P.y + P.h / 2 - c.y) < 26) {
      c.collected = true; score += 10; spawnParticles(c.x, c.y, '#f9c74f', 5); updateHUD();
    }
  }

  if (P.x + P.w / 2 > goalX - 20 && P.x + P.w / 2 < goalX + 60) {
    state = 'clear'; score += 500; updateHUD(); return;
  }

  cameraX = Math.max(0, Math.min(P.x + P.w / 2 - W * 0.35, LEVEL_W - W));
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.decay; }
  particles = particles.filter(p => p.life > 0);
  enemies = enemies.filter(e => e.alive || e.deathTimer > 0);
}

function onPlayerHit() { lives--; P.invincible = 120; spawnParticles(P.x + 28, P.y + 22, '#e63946', 8); updateHUD(); if (lives <= 0) state = 'gameover'; }
function onPlayerDie() { lives--; updateHUD(); if (lives <= 0) state = 'gameover'; else resetPlayer(); }
function killEnemy(e) { e.alive = false; e.deathTimer = 28; score += 100; spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#f4a261', 10); updateHUD(); }

// ── DRAW ──────────────────────────────────────────────
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#5ba8d4'); grad.addColorStop(1, '#b8dcee');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  for (let i = 0; i * 260 < LEVEL_W + W; i++) {
    const sx = i * 260 - cameraX * 0.15;
    if (sx < -200 || sx > W + 200) continue;
    const cy = 38 + (i % 4) * 22, cw = 52 + (i % 3) * 18;
    ctx.beginPath();
    ctx.arc(sx, cy, cw * 0.48, 0, Math.PI * 2);
    ctx.arc(sx + cw * 0.42, cy - 11, cw * 0.33, 0, Math.PI * 2);
    ctx.arc(sx + cw * 0.76, cy, cw * 0.38, 0, Math.PI * 2);
    ctx.fill();
  }
  // Mountains
  for (let i = 0; i * 220 < LEVEL_W + W; i++) {
    const sx = i * 220 - cameraX * 0.35;
    if (sx < -230 || sx > W + 230) continue;
    const mh = 78 + (i % 3) * 42;
    ctx.fillStyle = i % 2 === 0 ? '#7a9eaa' : '#8aaebc';
    ctx.beginPath(); ctx.moveTo(sx, GROUND_Y); ctx.lineTo(sx + 110, GROUND_Y - mh); ctx.lineTo(sx + 220, GROUND_Y); ctx.fill();
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath(); ctx.moveTo(sx + 94, GROUND_Y - mh + 22); ctx.lineTo(sx + 110, GROUND_Y - mh); ctx.lineTo(sx + 126, GROUND_Y - mh + 22); ctx.fill();
  }
  // Ground
  ctx.fillStyle = '#5c8a3c'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#3d6b20'; ctx.fillRect(0, GROUND_Y, W, 10);
  ctx.fillStyle = '#4a7a2e';
  const si = Math.floor(cameraX / 65);
  for (let i = si; i < si + 14; i++) {
    if (i % 2 === 0) { ctx.beginPath(); ctx.arc(i * 65 - cameraX + 20, GROUND_Y + 22, 7, 0, Math.PI * 2); ctx.fill(); }
  }
}

function drawPlatforms() {
  for (const pl of platforms) {
    const sx = pl.x - cameraX;
    if (sx > W + 10 || sx + pl.w < -10) continue;
    ctx.fillStyle = '#2d5010'; ctx.fillRect(sx, pl.y + pl.h - 5, pl.w, 5);
    ctx.fillStyle = '#5c8a3c'; ctx.fillRect(sx, pl.y, pl.w, pl.h - 5);
    ctx.fillStyle = '#6aaa40'; ctx.fillRect(sx, pl.y, pl.w, 6);
  }
}

function drawCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const sx = c.x - cameraX;
    if (sx < -20 || sx > W + 20) continue;
    const sy = c.y + Math.sin(c.bob) * 4;
    ctx.save(); ctx.shadowColor = '#f9c74f'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#f9c74f'; ctx.beginPath(); ctx.arc(sx, sy, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd770'; ctx.beginPath(); ctx.arc(sx - 2, sy - 2, 5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawGoal() {
  const sx = goalX - cameraX;
  if (sx < -10 || sx > W + 10) return;
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(sx, GROUND_Y); ctx.lineTo(sx, GROUND_Y - 110); ctx.stroke();
  const wave = Math.sin(Date.now() / 200) * 5;
  ctx.fillStyle = '#e63946';
  ctx.beginPath(); ctx.moveTo(sx, GROUND_Y - 110); ctx.lineTo(sx + 38, GROUND_Y - 95 + wave); ctx.lineTo(sx, GROUND_Y - 78); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('GOAL', sx, GROUND_Y - 118);
}

function drawTriceratops(bx, by, facing, anim, attacking, inv) {
  if (inv > 0 && Math.floor(inv / 7) % 2 === 0) return;
  ctx.save(); ctx.translate(bx, by);
  if (facing === -1) ctx.scale(-1, 1);
  const sw = Math.sin(anim * 0.22) * 7;
  // Tail
  ctx.strokeStyle = '#4a8040'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-22, -30); ctx.quadraticCurveTo(-46, -18, -44, -40); ctx.stroke();
  // Back legs
  ctx.fillStyle = '#3e7035';
  ctx.fillRect(-22, -12, 11, 13 + sw); ctx.fillRect(-9, -12, 11, 13 - sw);
  // Body
  ctx.fillStyle = '#5a9050';
  ctx.beginPath(); ctx.ellipse(1, -27, 29, 18, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#6aaa5a';
  ctx.beginPath(); ctx.ellipse(-4, -34, 14, 7, -0.3, 0, Math.PI * 2); ctx.fill();
  // Frill
  ctx.fillStyle = '#c83020';
  ctx.beginPath(); ctx.moveTo(12, -32); ctx.arc(16, -27, 22, -Math.PI * 0.88, Math.PI * 0.25); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#ff4422'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI * 0.8 + i * Math.PI * 0.24;
    ctx.beginPath(); ctx.moveTo(16, -27); ctx.lineTo(16 + Math.cos(a) * 21, -27 + Math.sin(a) * 21); ctx.stroke();
  }
  // Head
  ctx.fillStyle = '#4a8040'; ctx.roundRect(15, -42, 34, 26, 5); ctx.fill();
  ctx.fillStyle = '#5a9050'; ctx.fillRect(15, -42, 34, 9);
  // Brow horns
  ctx.fillStyle = '#ddd5b0';
  ctx.beginPath(); ctx.moveTo(23, -42); ctx.lineTo(19, -57); ctx.lineTo(30, -42); ctx.fill();
  ctx.beginPath(); ctx.moveTo(36, -42); ctx.lineTo(33, -55); ctx.lineTo(44, -42); ctx.fill();
  // Nose horn
  ctx.fillStyle = attacking ? '#ffee00' : '#cec5a5';
  if (attacking) { ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 14; }
  ctx.beginPath(); ctx.moveTo(49, -28); ctx.lineTo(65, -34); ctx.lineTo(49, -20); ctx.fill();
  ctx.shadowBlur = 0;
  // Front legs
  ctx.fillStyle = '#4a8040';
  ctx.fillRect(8, -12, 11, 13 - sw); ctx.fillRect(20, -12, 11, 13 + sw);
  // Eye
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(38, -31, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a2e'; ctx.beginPath(); ctx.arc(39, -31, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(40, -32, 1.2, 0, Math.PI * 2); ctx.fill();
  // Nostril
  ctx.fillStyle = '#2d6020'; ctx.beginPath(); ctx.arc(46, -23, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive && e.deathTimer <= 0) return;
  const sx = e.x - cameraX;
  if (sx < -60 || sx + e.w > W + 60) return;
  ctx.save(); ctx.translate(sx + e.w / 2, e.y + e.h);
  if (!e.alive) { ctx.scale(1.4, 0.25); ctx.globalAlpha = e.deathTimer / 28; }
  else if (e.facing === -1) ctx.scale(-1, 1);
  const sw = Math.sin(e.animFrame * 0.22) * 6;
  // Body
  ctx.fillStyle = '#7a3018';
  ctx.beginPath(); ctx.ellipse(-2, -22, 14, 10, 0.2, 0, Math.PI * 2); ctx.fill();
  // Dorsal spikes
  ctx.fillStyle = '#a04020';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(-10 + i * 6, -30); ctx.lineTo(-7 + i * 6, -40); ctx.lineTo(-4 + i * 6, -30); ctx.fill();
  }
  // Head
  ctx.fillStyle = '#6a2810'; ctx.roundRect(4, -36, 22, 16, 3); ctx.fill();
  ctx.fillStyle = '#c03010'; ctx.roundRect(18, -28, 10, 6, 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillRect(18, -26, 3, 4); ctx.fillRect(23, -26, 3, 4);
  // Eye
  ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(14, -31, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(15, -31, 2, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.fillStyle = '#5a2010';
  ctx.fillRect(-10, -12, 8, 14 + sw); ctx.fillRect(1, -12, 8, 14 - sw);
  ctx.fillRect(6, -30, 6, 9);
  // Tail
  ctx.strokeStyle = '#7a3018'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-16, -20); ctx.quadraticCurveTo(-30, -12, -32, -26); ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(p.x - cameraX, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawTitle() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#5ba8d4'); grad.addColorStop(1, '#b8dcee');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#5c8a3c'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#3d6b20'; ctx.fillRect(0, GROUND_Y, W, 10);
  drawTriceratops(W / 2, GROUND_Y, 1, Date.now() / 80, false, 0);
  ctx.fillStyle = 'rgba(0,0,20,0.52)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.shadowColor = '#f9c74f'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#f9c74f'; ctx.font = 'bold 40px sans-serif';
  ctx.fillText('トリケラトプス アドベンチャー', W / 2, 115);
  ctx.shadowBlur = 0; ctx.fillStyle = '#ddd'; ctx.font = '18px sans-serif';
  ctx.fillText('← → : 移動　｜　↑ / Z : ジャンプ　｜　X : ツノ攻撃', W / 2, 188);
  ctx.fillText('敵の頭を踏むか、ツノ突きで倒せ！', W / 2, 222);
  ctx.fillText('旗までたどり着けばステージクリア！', W / 2, 256);
  ctx.shadowColor = '#f9c74f'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#f9c74f'; ctx.font = 'bold 23px sans-serif';
  ctx.fillText('[ スペース / ↑ ] でスタート', W / 2, 330);
  ctx.shadowBlur = 0;
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  if (state === 'clear') {
    ctx.fillStyle = '#f9c74f'; ctx.shadowColor = '#f9c74f'; ctx.shadowBlur = 15;
    ctx.font = 'bold 50px sans-serif'; ctx.fillText('STAGE CLEAR!', W / 2, H / 2 - 40);
  } else {
    ctx.fillStyle = '#e63946'; ctx.shadowColor = '#e63946'; ctx.shadowBlur = 15;
    ctx.font = 'bold 50px sans-serif'; ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
  }
  ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '24px sans-serif';
  ctx.fillText('スコア: ' + score, W / 2, H / 2 + 15);
  ctx.fillStyle = '#ccc'; ctx.font = '20px sans-serif';
  ctx.fillText('[ スペース / ↑ ] で' + (state === 'clear' ? '次のステージへ' : 'リトライ'), W / 2, H / 2 + 62);
}

function loop() {
  if (state === 'title') { drawTitle(); requestAnimationFrame(loop); return; }
  if (state === 'playing') update();
  drawBg(); drawPlatforms(); drawCoins(); drawGoal();
  for (const e of enemies) drawEnemy(e);
  const px = P.x + P.w / 2 - cameraX, py = P.y + P.h;
  drawTriceratops(px, py, P.facing, P.animFrame, P.attackTimer > 12, P.invincible);
  if (P.attackTimer > 12) {
    const ax = P.facing === 1 ? px + 32 : px - 32;
    ctx.save(); ctx.globalAlpha = (P.attackTimer - 12) / 10 * 0.55;
    ctx.fillStyle = '#ffee00'; ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 22;
    ctx.beginPath(); ctx.arc(ax, py - 28, 20, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  drawParticles();
  if (state === 'clear' || state === 'gameover') drawOverlay();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
